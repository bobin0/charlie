<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0014"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7B2EFF"/>
      <stop offset="0.5" stop-color="#FF0080"/>
      <stop offset="1" stop-color="#00E5FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.2" r="0.8">
      <stop offset="0" stop-color="#7B2EFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7B2EFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <text x="80" y="300" font-family="Georgia, serif" font-size="120" font-weight="700" fill="#fff">CHARLIE</text>
  <text x="84" y="380" font-family="Arial, sans-serif" font-size="34" letter-spacing="14" fill="url(#txt)">NIGHT CLUB</text>
  <text x="84" y="470" font-family="Arial, sans-serif" font-size="40" fill="rgba(255,255,255,0.65)">The Night Starts Here.</text>
  <rect x="84" y="520" width="320" height="2" fill="url(#txt)"/>
</svg>
